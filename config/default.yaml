# Hermes Outreach Engine — default config
# dry_run is TRUE by default: no live email/SMS/calls.

dry_run: true

sender:
  name: Alex
  from_email: outreach@example.com

channels:
  email:
    enabled: true
    dry_run: true
  sms:
    enabled: true
    dry_run: true
  call:
    enabled: true
    dry_run: true

scoring:
  weights:
    email_opened: 1
    email_replied: 15
    sms_replied: 12
    call_interest: 20
    booked_call: 25
    asked_pricing: 18
    visited_discord_invite: 10
    explicit_demo_request: 22
    interest_keywords: 12
    hostile: -50
    opt_out: 0
  stages:
    cold: [0, 9]
    warm: [10, 24]
    hot: [25, 49]
    qualified: [50, null]

handoff:
  min_score: 40
  stages:
    - hot
    - qualified
  signals_any:
    - booked_call
    - asked_pricing
    - explicit_demo_request
    - call_interest
    - interest_keywords
  block_on_opt_out: true
  block_on_hostile: false

sequence:
  id: crypto_discord_default

# Owner notifications when a lead meets handoff criteria.
# Discord is primary (friend may not use Telegram).
# notify.dry_run can be false while channels stay dry_run — useful for live demo pings.
notify:
  primary: discord
  dry_run: true
  discord:
    enabled: true
    dry_run: true
    # Prefer a channel webhook (easiest for meeting demo):
    # webhook_url: https://discord.com/api/webhooks/...
    # Or bot post:
    # channel_id: "1234567890"
    # bot token from env DISCORD_BOT_TOKEN / DISCORD_HANDOFF_BOT_TOKEN
  telegram:
    enabled: false
    dry_run: true
    # chat_id from env TELEGRAM_HANDOFF_CHAT_ID
  webhook:
    dry_run: true
    # url: optional generic JSON webhook

model:
  primary: xai/grok
  fallback: openrouter
